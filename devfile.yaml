schemaVersion: 2.2.0
metadata:
  name: test-secure
components:
  - name: node
    container:
      image: registry.access.redhat.com/ubi9/nodejs-20
      endpoints:
        - name: web
          targetPort: 3000
          exposure: public
          secure: true
commands:
  - id: run
    exec:
      component: node
      commandLine: node -e "require('http').createServer((req,res)=>res.end('Hello secure')).listen(3000)"
      group:
        kind: run
        isDefault: true
