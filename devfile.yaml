schemaVersion: 2.2.0
metadata:
  name: test-web
components:
  - name: web
    container:
      image: quay.io/python:3.11
      endpoints:
        - name: http
          targetPort: 8080
          exposure: internal
commands:
  - id: run
    exec:
      component: web
      commandLine: python -m http.server 8080
      group:
        kind: run
        isDefault: true
